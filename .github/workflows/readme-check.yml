name: README Check

on:
  push:
    paths:
      - 'README.md'
  pull_request:
    paths:
      - 'README.md'
  schedule:
    # Run weekly on Mondays at 09:00 UTC to catch badge/link rot
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint README with markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'README.md'

  check-links:
    name: Check Links & Badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check all links in README
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --exclude-mail
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            --exclude "https://img.shields.io"
            README.md
          fail: true

      - name: Check badge URLs respond
        run: |
          echo "Checking shields.io badge URLs..."
          grep -oP 'https://img\.shields\.io/badge/[^)\"]+' README.md | while read url; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" -ne 200 ]; then
              echo "FAIL ($status): $url"
              exit 1
            else
              echo "OK   ($status): $url"
            fi
          done
